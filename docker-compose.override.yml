version: '3.8'

services:
  postgres:
    ports:
      - "5434:5432"

  migrator:
    volumes:
      - .:/workspace
      - /workspace/node_modules

  dashboard-web:
    build:
      context: .
      dockerfile: ./docker/dashboard/Dockerfile
      target: builder
    command: pnpm --filter dashboard-web dev
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/apps/dashboard-web/.next
    environment:
      NODE_ENV: development

  runner:
    build:
      context: .
      dockerfile: ./docker/runner/Dockerfile
    command: pnpm --filter runner dev
    volumes:
      - .:/workspace
      - /workspace/node_modules
    environment:
      NODE_ENV: development
