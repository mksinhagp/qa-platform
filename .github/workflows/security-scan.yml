name: Security Scan

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: security-scan
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Dependency vulnerability audit
  # ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (HIGH and above)
        # Exit code non-zero if any HIGH/CRITICAL vulnerabilities are found
        run: pnpm audit --audit-level=high

  # ─────────────────────────────────────────────
  # Job 2: Docker image vulnerability scan (Trivy)
  # ─────────────────────────────────────────────
  docker-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build dashboard image locally for scanning
      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dashboard/Dockerfile
          push: false
          tags: qa-platform/dashboard:scan
          load: true
          cache-from: type=gha,scope=dashboard

      # Build runner image locally for scanning
      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runner/Dockerfile
          push: false
          tags: qa-platform/runner:scan
          load: true
          cache-from: type=gha,scope=runner

      - name: Scan dashboard image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: qa-platform/dashboard:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Scan runner image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: qa-platform/runner:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Upload Trivy SARIF report to GitHub Security tab
      - name: Trivy SARIF — dashboard
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: qa-platform/dashboard:scan
          format: sarif
          output: trivy-dashboard.sarif

      - name: Trivy SARIF — runner
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: qa-platform/runner:scan
          format: sarif
          output: trivy-runner.sarif

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: |
            trivy-dashboard.sarif
            trivy-runner.sarif

  # ─────────────────────────────────────────────
  # Job 3: Secret scanning (TruffleHog)
  # ─────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for secret detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — scan for leaked secrets
        uses: trufflesecurity/trufflehog-actions-scan@v2
        with:
          # On push to main scan only the commits in this push;
          # on schedule / workflow_dispatch scan the full history.
          base: ${{ github.event_name == 'push' && github.event.before || '' }}
          head: ${{ github.sha }}
          extra_args: --only-verified
