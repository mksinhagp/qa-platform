name: Deploy — Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual deployment
        required: false
        default: Manual trigger

# Prevent concurrent staging deployments
concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Gate: CI must pass before we deploy.
  # On push to main the ci.yml workflow already ran in the same SHA,
  # but workflow_dispatch could be on an arbitrary commit, so we re-run
  # the lightweight build check here as a gate step instead of
  # requiring a separate workflow (GitHub Actions cross-workflow wait
  # requires paid plans or third-party actions).
  # ─────────────────────────────────────────────

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build Docker images locally so we can verify they compile ──────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image (staging tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dashboard/Dockerfile
          push: false
          tags: qa-platform/dashboard:staging
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
          outputs: type=docker

      - name: Build runner image (staging tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runner/Dockerfile
          push: false
          tags: qa-platform/runner:staging
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner
          outputs: type=docker

      # ── Save images as tarballs for transfer ──────────────────────────────
      - name: Save Docker images as tarballs
        run: |
          docker save qa-platform/dashboard:staging | gzip > /tmp/dashboard.tar.gz
          docker save qa-platform/runner:staging    | gzip > /tmp/runner.tar.gz

      # ── Copy image tarballs to the staging server ─────────────────────────
      - name: Copy images to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: /tmp/dashboard.tar.gz,/tmp/runner.tar.gz
          target: /tmp/qa-platform-images/
          strip_components: 2   # drop the /tmp prefix

      # ── SSH into staging and orchestrate the deployment ───────────────────
      - name: Deploy on staging server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
          GIT_SHA: ${{ github.sha }}
          DASHBOARD_SESSION_SECRET: ${{ secrets.STAGING_DASHBOARD_SESSION_SECRET }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: DEPLOY_PATH,GIT_SHA,DASHBOARD_SESSION_SECRET
          # Each line is a separate command executed via SSH
          script: |
            set -euo pipefail

            echo "==> Loading Docker images"
            docker load -i /tmp/qa-platform-images/dashboard.tar.gz
            docker load -i /tmp/qa-platform-images/runner.tar.gz
            rm -rf /tmp/qa-platform-images

            echo "==> Pulling latest source code at ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Writing staging environment file"
            cat > .env.staging <<EOF
            NODE_ENV=production
            DASHBOARD_SESSION_SECRET=${DASHBOARD_SESSION_SECRET}
            EOF

            echo "==> Bringing up services with staging compose override"
            docker compose \
              -f docker-compose.yml \
              -f docker/docker-compose.staging.yml \
              --env-file .env.staging \
              up -d --remove-orphans

            echo "==> Running database migrations"
            docker compose \
              -f docker-compose.yml \
              -f docker/docker-compose.staging.yml \
              --env-file .env.staging \
              run --rm migrator

            echo "==> Cleaning up dangling images"
            docker image prune -f

      # ── Health check — wait for dashboard /api/health to return 200 ───────
      - name: Health check — dashboard /api/health
        run: |
          STAGING_URL="http://${{ secrets.STAGING_SSH_HOST }}:3000/api/health"
          echo "Waiting for ${STAGING_URL} ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}" || true)
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/24 — status ${STATUS}, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 4 minutes"
          exit 1

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "Deployment to staging succeeded."
          echo "  Commit : ${{ github.sha }}"
          echo "  Actor  : ${{ github.actor }}"
          echo "  Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
