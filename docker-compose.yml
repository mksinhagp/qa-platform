services:
  postgres:
    image: postgres:16-alpine
    container_name: qa-platform-postgres
    environment:
      POSTGRES_DB: qa_platform
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qa-platform-network

  migrator:
    build:
      context: .
      dockerfile: docker/migrator/Dockerfile
    container_name: qa-platform-migrator
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: qa_platform
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qa-platform-network

  dashboard-web:
    build:
      context: .
      dockerfile: ./docker/dashboard/Dockerfile
    container_name: qa-platform-dashboard
    environment:
      NODE_ENV: production
      DASHBOARD_PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: qa_platform
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:?DASHBOARD_SESSION_SECRET is required}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - qa-platform-network

  runner:
    build:
      context: .
      dockerfile: ./docker/runner/Dockerfile
    container_name: qa-platform-runner
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - qa-platform-network

  ollama:
    image: ollama/ollama:latest
    container_name: qa-platform-ollama
    profiles:
      - llm
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - qa-platform-network

  mailcatcher:
    image: schickling/mailcatcher:latest
    container_name: qa-platform-mailcatcher
    profiles:
      - dev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - qa-platform-network

  # ---------------------------------------------------------------------------
  # Backup service — only runs when explicitly invoked via:
  #   docker compose --profile backup run --rm backup
  # Shares the same postgres image so pg_dump version always matches the server.
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: qa-platform-backup
    profiles:
      - backup
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: qa_platform
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backups:/backups
      - ./docker/postgres/backup.sh:/usr/local/bin/backup.sh:ro
    command: ["/bin/sh", "-c", "chmod +x /usr/local/bin/backup.sh && /usr/local/bin/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qa-platform-network

volumes:
  pg_data:
  ollama_models:
  backups:

networks:
  qa-platform-network:
    driver: bridge
